name: Windows Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/windows-build.yml'
      - 'cmd/**'
      - 'internal/**'
      - 'install/**'
      - 'go.mod'
      - 'VERSION'
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: nv-windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build NV Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - id: version
        shell: pwsh
        run: |
          $semver = (Get-Content VERSION | Select-Object -First 1).Trim()
          "semver=$semver" >> $env:GITHUB_OUTPUT
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags="-s -w -X main.nvVersion=${{ steps.version.outputs.semver }}" -o dist\nv.exe .\cmd\nv
      - uses: actions/upload-artifact@v4
        with:
          name: nv-windows
          path: dist/nv.exe

  publish-windows:
    name: Publish NV Windows Branch
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: nv-windows
          path: stage
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          semver="$(tr -d '[:space:]' < VERSION)"
          mkdir -p publish/windows
          cp stage/nv.exe "publish/windows/nv-${semver}.exe"
          cp stage/nv.exe publish/windows/nv.exe
          sha="$(sha256sum "publish/windows/nv-${semver}.exe" | awk '{print $1}')"
          raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/windows-builds"
          export SEMVER="$semver" SHA="$sha" RAW_BASE="$raw_base"
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          generated_at = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          manifest = {
              'success': True,
              'generated_at': generated_at,
              'release_channel': 'main',
              'artifacts': [
                  {
                      'platform': 'nv-windows',
                      'channel': 'main',
                      'version': os.environ['SEMVER'],
                      'sha256': os.environ['SHA'],
                      'download_url': f"{os.environ['RAW_BASE']}/windows/nv-{os.environ['SEMVER']}.exe",
                      'file_name': f"nv-{os.environ['SEMVER']}.exe",
                      'metadata': {}
                  }
              ]
          }
          with open('publish/manifest.json','w',encoding='utf-8') as fh:
              json.dump(manifest, fh, ensure_ascii=False, indent=2)
          with open('publish/BUILD_INFO.txt','w',encoding='utf-8') as fh:
              fh.write(f"Repository: {os.environ['GITHUB_REPOSITORY']}\nVersion: {os.environ['SEMVER']}\nCommit: {os.environ['GITHUB_SHA']}\nWorkflow Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}\nBuilt At: {generated_at}\n")
          PY
          cp install/nv.ps1 publish/nv.ps1
          tmpdir="$(mktemp -d)"
          cp -R publish/. "$tmpdir/"
          cd "$tmpdir"
          git init
          git checkout -b windows-builds
          git add .
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "Publish NV Windows ${semver} for ${GITHUB_SHA} [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin windows-builds
