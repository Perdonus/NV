<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f1318">
  <meta name="color-scheme" content="dark">
  <title>NV</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="install-card" aria-label="Установка NV">
      <div class="toggle-row" role="group" aria-label="Operating system">
        <button class="toggle" type="button" data-os-toggle="linux" aria-pressed="true">Linux</button>
        <button class="toggle" type="button" data-os-toggle="windows" aria-pressed="false">Windows</button>
      </div>

      <button class="command-card command-card--hero" type="button" data-copy-command>
        <span class="command-label">Установить NV</span>
        <span class="command-main">
          <code class="command-text" data-command-text>curl -fsSL https://sosiskibot.ru/install/nv.sh | sh</code>
          <span class="copy-badge" aria-hidden="true">
            <span class="copy-badge__sheet copy-badge__sheet--back"></span>
            <span class="copy-badge__sheet copy-badge__sheet--front"></span>
          </span>
        </span>
      </button>
    </section>

    <div class="section-tag">Пакеты</div>
    <ul class="package-list" id="project-list" aria-label="Пакеты"></ul>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
